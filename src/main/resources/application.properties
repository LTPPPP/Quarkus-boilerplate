# ============================================================
# APPLICATION CONFIG
# ============================================================
quarkus.application.name=${APP_NAME:quarkus-boilerplate}
quarkus.http.port=8080

# ============================================================
# DATASOURCE (PostgreSQL)
# ============================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:appdb}
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5

# ============================================================
# HIBERNATE ORM
# ============================================================
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ============================================================
# FLYWAY
# ============================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# ============================================================
# REDIS
# ============================================================
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
quarkus.redis.timeout=5S

# ============================================================
# JWT / SECURITY
# ============================================================
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=${JWT_ISSUER:https://your-domain.example.com}
smallrye.jwt.sign.key.location=privateKey.pem
quarkus.smallrye-jwt.enabled=true

# ============================================================
# KAFKA - OUTGOING CHANNELS
# ============================================================
# User Events
mp.messaging.outgoing.user-events-out.connector=smallrye-kafka
mp.messaging.outgoing.user-events-out.topic=user-events
mp.messaging.outgoing.user-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.user-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.user-events-out.acks=all
mp.messaging.outgoing.user-events-out.retries=3

# Order Events
mp.messaging.outgoing.order-events-out.connector=smallrye-kafka
mp.messaging.outgoing.order-events-out.topic=order-events
mp.messaging.outgoing.order-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.order-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.order-events-out.acks=all
mp.messaging.outgoing.order-events-out.retries=3

# Payment Events
mp.messaging.outgoing.payment-events-out.connector=smallrye-kafka
mp.messaging.outgoing.payment-events-out.topic=payment-events
mp.messaging.outgoing.payment-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.payment-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.payment-events-out.acks=all
mp.messaging.outgoing.payment-events-out.retries=3

# Notification Events
mp.messaging.outgoing.notification-events-out.connector=smallrye-kafka
mp.messaging.outgoing.notification-events-out.topic=notification-events
mp.messaging.outgoing.notification-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.notification-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.notification-events-out.acks=all
mp.messaging.outgoing.notification-events-out.retries=3

# ============================================================
# KAFKA - INCOMING CHANNELS
# ============================================================
# User Events Consumer
mp.messaging.incoming.user-events-in.connector=smallrye-kafka
mp.messaging.incoming.user-events-in.topic=user-events
mp.messaging.incoming.user-events-in.group.id=user-service-group
mp.messaging.incoming.user-events-in.auto.offset.reset=earliest
mp.messaging.incoming.user-events-in.enable.auto.commit=false
mp.messaging.incoming.user-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.user-events-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.user-events-in.failure-strategy=dead-letter-queue

# Order Events Consumer
mp.messaging.incoming.order-events-in.connector=smallrye-kafka
mp.messaging.incoming.order-events-in.topic=order-events
mp.messaging.incoming.order-events-in.group.id=order-service-group
mp.messaging.incoming.order-events-in.auto.offset.reset=earliest
mp.messaging.incoming.order-events-in.enable.auto.commit=false
mp.messaging.incoming.order-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-events-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-events-in.failure-strategy=dead-letter-queue

# Payment Events Consumer
mp.messaging.incoming.payment-events-in.connector=smallrye-kafka
mp.messaging.incoming.payment-events-in.topic=payment-events
mp.messaging.incoming.payment-events-in.group.id=payment-service-group
mp.messaging.incoming.payment-events-in.auto.offset.reset=earliest
mp.messaging.incoming.payment-events-in.enable.auto.commit=false
mp.messaging.incoming.payment-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-events-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-events-in.failure-strategy=dead-letter-queue

# Dead Letter Queue Consumer
mp.messaging.incoming.dead-letter-queue.connector=smallrye-kafka
mp.messaging.incoming.dead-letter-queue.topic=dead-letter-queue
mp.messaging.incoming.dead-letter-queue.group.id=dlq-handler-group
mp.messaging.incoming.dead-letter-queue.auto.offset.reset=earliest
mp.messaging.incoming.dead-letter-queue.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.dead-letter-queue.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ============================================================
# KAFKA GLOBAL
# ============================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ============================================================
# gRPC SERVER
# ============================================================
quarkus.grpc.server.port=${GRPC_PORT:9000}
quarkus.grpc.server.enable-reflection-service=true
quarkus.grpc.server.max-inbound-message-size=4194304

# ============================================================
# gRPC CLIENTS
# ============================================================
quarkus.grpc.clients.user-service.host=${GRPC_USER_SERVICE_HOST:localhost}
quarkus.grpc.clients.user-service.port=${GRPC_USER_SERVICE_PORT:9000}

quarkus.grpc.clients.payment-service.host=${GRPC_PAYMENT_SERVICE_HOST:localhost}
quarkus.grpc.clients.payment-service.port=${GRPC_PAYMENT_SERVICE_PORT:9000}

# ============================================================
# MULTI-TENANCY
# ============================================================
app.multitenancy.strategy=SCHEMA
app.multitenancy.tenant-header=X-Tenant-ID
app.multitenancy.default-schema=public
app.multitenancy.cache.datasource-ttl=PT30M
app.multitenancy.public-paths=/api/v1/auth,/api/v1/public,/q/health,/q/metrics,/q/openapi

# ============================================================
# ENCRYPTION
# ============================================================
app.encryption.key=${ENCRYPTION_KEY:change-this-default-key-32chars!}

# ============================================================
# OPENTELEMETRY
# ============================================================
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=${APP_NAME:quarkus-boilerplate}
quarkus.otel.traces.enabled=true
quarkus.otel.metrics.enabled=true

# ============================================================
# HEALTH & METRICS
# ============================================================
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

# ============================================================
# LOGGING
# ============================================================
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) [tenant=%X{tenantId}] %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.example.app".level=DEBUG
quarkus.log.category."org.hibernate.SQL".level=WARN

# ============================================================
# DEV PROFILE OVERRIDES
# ============================================================
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.log.category."org.hibernate.SQL".level=DEBUG
%dev.quarkus.flyway.migrate-at-start=false

%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.migrate-at-start=false
%test.mp.messaging.outgoing.user-events-out.connector=smallrye-in-memory
%test.mp.messaging.outgoing.order-events-out.connector=smallrye-in-memory
%test.mp.messaging.outgoing.payment-events-out.connector=smallrye-in-memory
%test.mp.messaging.outgoing.notification-events-out.connector=smallrye-in-memory
%test.mp.messaging.incoming.user-events-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.order-events-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.payment-events-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.dead-letter-queue.connector=smallrye-in-memory
