server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers on the app-network
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*"
        action: keep
      # Use container name as label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Add container_id label
      - source_labels: ["__meta_docker_container_id"]
        target_label: "container_id"
    pipeline_stages:
      # Try to parse JSON logs from the app container
      - match:
          selector: '{container=~".*-app"}'
          stages:
            - json:
                expressions:
                  level: level
                  loggerName: loggerName
                  message: message
                  tenantId: tenantId
                  userId: userId
                  traceId: traceId
                  spanId: spanId
                  timestamp: timestamp
            - labels:
                level:
                loggerName:
                tenantId:
            - timestamp:
                source: timestamp
                format: "2006-01-02T15:04:05.000Z"
                fallback_formats:
                  - "2006-01-02T15:04:05Z07:00"
      # Label all logs with the job
      - labels:
          job: docker
