global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "quarkus-app"
    metrics_path: /q/metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["app:8080"]
        labels:
          application: "quarkus-boilerplate"
          environment: "local"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
